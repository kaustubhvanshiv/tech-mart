<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tech Mart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>Tech Mart</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Upgrade Your Tech 🚀</h2>
        <p>Latest gadgets at best prices</p>
        <button>Shop Now</button>
    </section>

    <!-- Products -->
    <section class="products">

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>Laptop</h3>
            <p>₹60,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>Smartphone</h3>
            <p>₹25,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>Headphones</h3>
            <p>₹3,000</p>
            <button>Add to Cart</button>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150" alt="">
            <h3>Smart Watch</h3>
            <p>₹5,000</p>
            <button>Add to Cart</button>
        </div>

    </section>

</body>
</html>
